c": "/j…Ēňźrz/", "pos": "pron.", "definition": "šĹ†ÁöĄ"}, {"word": "yourself", "phonetic": "/j…Ēňźrňąself/", "pos": "pron.", "definition": "šĹ†Ťá™Ś∑Ī"}, {"word": "youth", "phonetic": "/juňźőł/", "pos": "n.", "definition": "ťĚíŚĻī"}, {"word": "zeal", "phonetic": "/ziňźl/", "pos": "n.", "definition": "ÁÉ≠śÉÖ"}, {"word": "zebra", "phonetic": "/ňąziňźbr…ô/", "pos": "n.", "definition": "śĖĎť©¨"}, {"word": "zero", "phonetic": "/ňąz…™…ôro ä/", "pos": "num.", "definition": "ťõ∂"}, {"word": "zone", "phonetic": "/zo än/", "pos": "n.", "definition": "ŚĆļŚüü"}, {"word": "zoo", "phonetic": "/zuňź/", "pos": "n.", "definition": "Śä®ÁČ©Śõ≠"}];
var curWords = [], curIdx = 0, correct = 0, total = 0;
var daily = 10;

function getSet() { var s = localStorage.settings; return s ? JSON.parse(s) : {daily:10,review:3,options:4}; }
function setSet(s) { localStorage.settings = JSON.stringify(s); }
function getRecords() { var r = localStorage.records; return r ? JSON.parse(r) : []; }
function saveRecords(records) { localStorage.records = JSON.stringify(records); }

function addRecord(word, known) {
  var records = getRecords();
  var today = new Date().toISOString().split("T")[0];
  records.push({word:word, known:known, date:today, time:new Date().toISOString()});
  if (records.length > 100) records = records.slice(-100);
  saveRecords(records);
  updateLearnedCount();
}

function updateLearnedCount() {
  var records = getRecords();
  var unique = {};
  for (var i = 0; i < records.length; i++) { unique[records[i].word] = true; }
  document.getElementById("learnedNum").textContent = Object.keys(unique).length;
}

function showPage(id) {
  document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active")});
  document.getElementById(id).classList.add("active");
  if (id === "pageProgress") renderRecords();
}

function init() {
  var s = getSet();
  daily = s.daily;
  document.getElementById("dailyNum").textContent = daily;
  document.getElementById("setDaily").value = s.daily;
  document.getElementById("setReview").value = s.review;
  document.getElementById("setOptions").value = s.options;
  updateLearnedCount();
  showPage("pageHome");
}

document.getElementById("saveSet").onclick = function() {
  var s = {daily:parseInt(document.getElementById("setDaily").value)||10,review:parseInt(document.getElementById("setReview").value)||3,options:parseInt(document.getElementById("setOptions").value)||4};
  setSet(s);
  daily = s.daily;
  document.getElementById("dailyNum").textContent = s.daily;
  alert("ŤģĺÁĹģŚ∑≤šŅĚŚ≠ė");
};

document.getElementById("toVocab").onclick = function() { showPage("pageVocab"); renderVocab(); };
document.getElementById("toQuiz").onclick = function() { startQuiz(); };
document.getElementById("toProgress").onclick = function() { showPage("pageProgress"); };
document.getElementById("toSettings").onclick = function() { showPage("pageSettings"); };
document.getElementById("backHome").onclick = function() { showPage("pageHome"); };
document.getElementById("backHome2").onclick = function() { showPage("pageHome"); };
document.getElementById("closeModal").onclick = function() { document.getElementById("completeModal").classList.remove("active"); showPage("pageHome"); };

document.getElementById("startLearn").onclick = function() {
  var s = getSet();
  var cnt = s.daily;
  curWords = [];
  var used = {};
  while (curWords.length < cnt) {
    var idx = Math.floor(Math.random() * vocab.length);
    if (!used[idx]) { used[idx] = true; curWords.push(vocab[idx]); }
  }
  curIdx = 0; correct = 0; total = 0;
  showPage("pageLearn");
  showWord();
};

function showWord() {
  if (curIdx >= curWords.length) {
    var r = total > 0 ? Math.round(correct / total * 100) : 0;
    document.getElementById("rateText").textContent = r + "%";
    document.getElementById("completeModal").classList.add("active");
    return;
  }
  var w = curWords[curIdx];
  document.getElementById("wordText").textContent = w.word;
  document.getElementById("phoneticText").textContent = w.phonetic;
  document.getElementById("posText").textContent = w.pos;
  document.getElementById("defText").classList.remove("show");
  document.getElementById("answerBtns").classList.remove("show");
  document.getElementById("learnBar").style.width = (curIdx / curWords.length * 100) + "%";
}

document.getElementById("speakBtn").onclick = function() {
  var w = curWords[curIdx];
  if (window.speechSynthesis) {
    var utt = new SpeechSynthesisUtterance(w.word);
    utt.lang = "en-US"; utt.rate = 0.8;
    window.speechSynthesis.speak(utt);
  }
  document.getElementById("answerBtns").classList.add("show");
};

function doAnswer(known) {
  var w = curWords[curIdx];
  addRecord(w.word, known);
  document.getElementById("defText").textContent = w.definition;
  document.getElementById("defText").classList.add("show");
  setTimeout(function() { curIdx++; showWord(); }, 1000);
}

document.getElementById("btnNo").onclick = function() { doAnswer(false); };
document.getElementById("btnYes").onclick = function() { doAnswer(true); };

function renderVocab() {
  var f = document.getElementById("searchBox").value;
  var ws = vocab;
  if (f) { ws = []; for (var i = 0; i < vocab.length; i++) { if (vocab[i].word.indexOf(f) !== -1 || vocab[i].definition.indexOf(f) !== -1) ws.push(vocab[i]); } }
  var html = "";
  for (var i = 0; i < Math.min(ws.length, 100); i++) { html += "<div class='item'><span>" + ws[i].word + "</span><span style='color:#888'>" + ws[i].definition + "</span></div>"; }
  document.getElementById("vocabList").innerHTML = html;
}
document.getElementById("searchBox").oninput = renderVocab;

function startQuiz() {
  var s = getSet();
  var cnt = s.daily;
  var opt = s.options;
  curWords = [];
  var used = {};
  while (curWords.length < cnt) {
    var idx = Math.floor(Math.random() * vocab.length);
    if (!used[idx]) { used[idx] = true; curWords.push(vocab[idx]); }
  }
  curIdx = 0; correct = 0; total = 0;
  showPage("pageQuiz");
  showQuiz(opt);
}

function showQuiz(opt) {
  if (curIdx >= curWords.length) {
    var r = total > 0 ? Math.round(correct / total * 100) : 0;
    document.getElementById("rateText").textContent = r + "%";
    document.getElementById("completeModal").classList.add("active");
    return;
  }
  var w = curWords[curIdx];
  document.getElementById("quizWord").textContent = w.word;
  document.getElementById("quizBar").style.width = (curIdx / curWords.length * 100) + "%";
  var opts = [w.definition];
  while (opts.length < opt) {
    var r = vocab[Math.floor(Math.random() * vocab.length)].definition;
    if (opts.indexOf(r) === -1) opts.push(r);
  }
  opts.sort(function() { return Math.random() - 0.5; });
  var html = "";
  for (var i = 0; i < opts.length; i++) { html += "<div class='quiz-opt' data='" + opts[i] + "'>" + opts[i] + "</div>"; }
  document.getElementById("quizOpts").innerHTML = html;
  document.getElementById("quizOpts").onclick = function(e) {
    if (e.target.classList.contains("quiz-opt")) {
      var known = e.target.getAttribute("data") === w.definition;
      if (known) correct++;
      total++;
      addRecord(w.word, known);
      curIdx++; showQuiz(opt);
    }
  };
}

function renderRecords() {
  var records = getRecords();
  var html = "";
  var recent = records.slice(-10).reverse();
  for (var i = 0; i < recent.length; i++) {
    var r = recent[i];
    var status = r.known ? '<span style="color:#5cb85c">Ťģ§ŤĮÜ</span>' : '<span style="color:#d9534f">šłćŤģ§ŤĮÜ</span>';
    html += "<div class='item'><span>" + r.word + "</span>" + status + "</div>";
  }
  if (!html) html = "<div style='padding:15px;color:#888;text-align:center'>śöāśó†Ś≠¶šĻ†ŤģįŚĹē</div>";
  document.getElementById("recentRecords").innerHTML = html;
  
  var totalV = vocab.length;
  var learned = {};
  for (var i = 0; i < records.length; i++) { learned[records[i].word] = true; }
  var count = Object.keys(learned).length;
  var pct = Math.round(count / totalV * 100);
  document.getElementById("progBar").style.width = pct + "%";
  document.getElementById("progText").textContent = count + "/" + totalV + " (" + pct + "%)";
}

init();
</script>
